<!DOCTYPE html >
<head>
   
   
    <style>
.game {
    width: 255px;
    text-align: center;
    font-family: system-ui;
    color: white;
    margin: auto;
    font-weight: 500;
}

.title {
    background: #f25;
    padding: 5px 0;
    margin: 5px 0;
}

span {
    color: #fa0;
}

.square {
    width: 80px;
    height: 80px;

    margin: 2px;
    font-size: 50px;
    color: black; /* تم تغيير لون النص إلى الأسود ليصبح مرئياً */

    justify-content: center; /* توسيط أفقي */
    align-items: center; /* توسيط عمودي */
    cursor: pointer; /* تغيير مؤشر الفأرة عند المرور فوق المربع */
}
    
    </style>
</head>
